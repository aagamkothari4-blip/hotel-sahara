<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">

  <div class="lightbox-prev" onclick="lightboxNav(-1)"><i class="fa fa-chevron-left"></i></div>
  <img src="" alt="" class="lightbox-img" id="lightboxImg">
  <div class="lightbox-next" onclick="lightboxNav(1)"><i class="fa fa-chevron-right"></i></div>
</div>

<script src="js/main.js"></script>
<script>
  let currentIndex = 0;
  let visibleItems = [];

  function filterGallery(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.className = 'filter-btn btn-outline-navy';
    });
    btn.className = 'filter-btn btn-navy active';

    document.querySelectorAll('.gallery-item').forEach(item => {
      if(cat === 'all' || item.dataset.category === cat) {
        item.classList.remove('hidden');
      } else {
        item.classList.add('hidden');
      }
    });
    visibleItems = [...document.querySelectorAll('.gallery-item:not(.hidden)')];
  }

  function openLightbox(index) {
    visibleItems = [...document.querySelectorAll('.gallery-item:not(.hidden)')];
    currentIndex = visibleItems.findIndex(item => parseInt(item.dataset.index) === index);
    if(currentIndex < 0) currentIndex = 0;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function lightboxNav(dir) {
    currentIndex = (currentIndex + dir + visibleItems.length) % visibleItems.length;
    updateLightbox();
  }

  function updateLightbox() {
    const item = visibleItems[currentIndex];
    const img  = item.querySelector('img');
    document.getElementById('lightboxImg').src = img.src;
    document.getElementById('lightboxImg').alt = img.alt;
  }

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if(!document.getElementById('lightbox').classList.contains('open')) return;
    if(e.key === 'ArrowRight') lightboxNav(1);
    if(e.key === 'ArrowLeft')  lightboxNav(-1);
    if(e.key === 'Escape') closeLightbox();
  });

  // Init visible items
  visibleItems = [...document.querySelectorAll('.gallery-item')];
</script>
